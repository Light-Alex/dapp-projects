<!DOCTYPE html>
<html>
<head>
    <title>WS Server Test</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }
        .container {
            display: flex;
            gap: 20px;
        }
        .left-panel {
            flex: 1;
        }
        .right-panel {
            flex: 1;
        }
        .input-group {
            margin-bottom: 15px;
        }
        label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
        }
        input, button {
            width: 100%;
            padding: 8px;
            box-sizing: border-box;
        }
        button {
            background-color: #4CAF50;
            color: white;
            border: none;
            cursor: pointer;
            margin-top: 5px;
        }
        button:hover {
            background-color: #45a049;
        }
        button:disabled {
            background-color: #cccccc;
            cursor: not-allowed;
        }
        .disconnect-btn {
            background-color: #f44336;
        }
        .disconnect-btn:hover {
            background-color: #da190b;
        }
        #messages {
            border: 1px solid #ccc;
            padding: 10px;
            height: 400px;
            overflow-y: auto;
            background-color: #f9f9f9;
            font-family: monospace;
            font-size: 12px;
        }
        .message {
            margin-bottom: 5px;
            padding: 5px;
            border-left: 3px solid #4CAF50;
            background-color: white;
        }
        .error {
            border-left-color: #f44336;
        }
        .status {
            padding: 10px;
            margin-bottom: 10px;
            border-radius: 4px;
        }
        .status.connected {
            background-color: #4CAF50;
            color: white;
        }
        .status.disconnected {
            background-color: #f44336;
            color: white;
        }
    </style>
</head>
<body>
    <h1>WS Server Test Client</h1>
    
    <div class="status disconnected" id="status">Disconnected</div>
    
    <div class="container">
        <div class="left-panel">
            <h2>Connection</h2>
            <div class="input-group">
                <label for="wsUrl">WebSocket URL:</label>
                <input type="text" id="wsUrl" value="ws://localhost:8082/api/v1/ws">
            </div>
            <button id="connectBtn" onclick="connect()">Connect</button>
            <button id="disconnectBtn" class="disconnect-btn" onclick="disconnect()" disabled>Disconnect</button>
            
            <h2>Subscribe</h2>
            <div class="input-group">
                <label for="symbols">Symbols (comma-separated):</label>
                <input type="text" id="symbols" value="AAPL,TSLA" placeholder="AAPL,TSLA,MSFT">
            </div>
            <button id="subscribeBtn" onclick="subscribe()" disabled>Subscribe to Bars</button>
            <button id="unsubscribeBtn" onclick="unsubscribe()" disabled>Unsubscribe from Bars</button>
        </div>
        
        <div class="right-panel">
            <h2>Messages</h2>
            <div id="messages"></div>
            <button onclick="clearMessages()">Clear Messages</button>
        </div>
    </div>

    <script>
        let ws = null;
        let messageId = 1;

        function addMessage(message, isError = false) {
            const messagesDiv = document.getElementById('messages');
            const messageDiv = document.createElement('div');
            messageDiv.className = 'message' + (isError ? ' error' : '');
            messageDiv.textContent = new Date().toLocaleTimeString() + ' - ' + message;
            messagesDiv.appendChild(messageDiv);
            messagesDiv.scrollTop = messagesDiv.scrollHeight;
        }

        function updateStatus(connected) {
            const statusDiv = document.getElementById('status');
            if (connected) {
                statusDiv.textContent = 'Connected';
                statusDiv.className = 'status connected';
                document.getElementById('connectBtn').disabled = true;
                document.getElementById('disconnectBtn').disabled = false;
                document.getElementById('subscribeBtn').disabled = false;
                document.getElementById('unsubscribeBtn').disabled = false;
            } else {
                statusDiv.textContent = 'Disconnected';
                statusDiv.className = 'status disconnected';
                document.getElementById('connectBtn').disabled = false;
                document.getElementById('disconnectBtn').disabled = true;
                document.getElementById('subscribeBtn').disabled = true;
                document.getElementById('unsubscribeBtn').disabled = true;
            }
        }

        function connect() {
            const url = document.getElementById('wsUrl').value;
            addMessage('Connecting to ' + url + '...');
            
            ws = new WebSocket(url);
            
            ws.onopen = function() {
                addMessage('Connected!');
                updateStatus(true);
            };
            
            ws.onmessage = function(event) {
                try {
                    const data = JSON.parse(event.data);
                    addMessage('Received: ' + JSON.stringify(data, null, 2));
                } catch (e) {
                    addMessage('Received: ' + event.data);
                }
            };
            
            ws.onerror = function(error) {
                addMessage('Error: ' + error, true);
            };
            
            ws.onclose = function() {
                addMessage('Disconnected');
                updateStatus(false);
                ws = null;
            };
        }

        function disconnect() {
            if (ws) {
                ws.close();
                ws = null;
            }
        }

        function subscribe() {
            if (!ws || ws.readyState !== WebSocket.OPEN) {
                addMessage('Not connected!', true);
                return;
            }
            
            const symbolsInput = document.getElementById('symbols').value;
            const symbols = symbolsInput.split(',').map(s => s.trim()).filter(s => s);
            
            if (symbols.length === 0) {
                addMessage('Please enter at least one symbol', true);
                return;
            }
            
            const message = {
                id: messageId++,
                method: 'SUBSCRIBE',
                params: {
                    type: 'bar',
                    symbols: symbols
                }
            };
            
            ws.send(JSON.stringify(message));
            addMessage('Sent: ' + JSON.stringify(message));
        }

        function unsubscribe() {
            if (!ws || ws.readyState !== WebSocket.OPEN) {
                addMessage('Not connected!', true);
                return;
            }
            
            const symbolsInput = document.getElementById('symbols').value;
            const symbols = symbolsInput.split(',').map(s => s.trim()).filter(s => s);
            
            if (symbols.length === 0) {
                addMessage('Please enter at least one symbol', true);
                return;
            }
            
            const message = {
                id: messageId++,
                method: 'UNSUBSCRIBE',
                params: {
                    type: 'bar',
                    symbols: symbols
                }
            };
            
            ws.send(JSON.stringify(message));
            addMessage('Sent: ' + JSON.stringify(message));
        }

        function clearMessages() {
            document.getElementById('messages').innerHTML = '';
        }
    </script>
</body>
</html>
