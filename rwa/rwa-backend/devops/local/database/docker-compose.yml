services:
  redis-stack:
    container_name: redis-stack
    image: 'redis/redis-stack-server:latest'
    restart: always
    ports:
      - '6379:6379'
    volumes:
      - ./redis-stack/data:/data
      - ./redis-stack/conf/redis-stack.conf:/redis-stack.conf
    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "10"
    networks:
      - database
    sysctls:
      net.core.somaxconn: '1024'

  postgres:
    container_name: postgres
    image: postgres:16.9
    restart: always
    env_file:
      - ./pg/pg.env
    ports:
      - 5432:5432
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./pg/conf/postgresql.conf:/etc/postgresql/postgresql.conf
    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "10"
    networks:
      - database

volumes:
  postgres_data:

networks:
  database:
    driver: bridge
