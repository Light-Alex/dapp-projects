[profile.default]
src = "src"
out = "out"
libs = ["lib"]
ast = true
ffi = true
optimizer = true          # 启用优化器
optimizer_runs = 200       # 优化次数
via_ir = true             # 启用 IR 编译器（增加栈深度）
fs_permissions = [
{ access = "read-write", path = "./deployments" },
{ access = "read", path = "./out" },
]

[rpc_endpoints]
localhost = "http://localhost:8545"
sepolia = "https://ethereum-sepolia.rpc.subquery.network/public"
bsc_test = "https://data-seed-prebsc-1-s1.binance.org:8545"

# 添加账户配置
# [account.default]
# private_key = "${PRIVATE_KEY}"

# Etherscan验证配置
[etherscan.sepolia]
key = "${ETHERSCAN_API_KEY}"
url = "https://api-sepolia.etherscan.io/api"
chain = 11155111

# BSC测试网验证配置
[etherscan.bsc_test]
key = "${ETHERSCAN_API_KEY}"
url = "https://api-testnet.bscscan.com/api"
chain = 97

# 验证器配置
[verify]
# 默认验证器（可选）
# default_verifier = "etherscan"

# 网络特定的验证配置
[verify.sepolia]
verifier = "etherscan"
verifier_url = "https://api-sepolia.etherscan.io/api"

[verify.bsc_test]
verifier = "etherscan"
verifier_url = "https://api-testnet.bscscan.com/api"

# See more config options https://github.com/foundry-rs/foundry/blob/master/crates/config/README.md#all-options